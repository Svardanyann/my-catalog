<!DOCTYPE html>
<html lang="hy">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Իմ Բիզնեսը</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-container img { transition: transform 0.3s ease; }
        .img-container:active img { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 pb-24 font-sans text-slate-900">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-bold text-xl tracking-tight">🏪 Իմ Վաճառքները</h1>
            <button onclick="openModal()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                + Նոր Ապրանք
            </button>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="relative flex-1">
                <input type="text" id="searchInput" oninput="searchProducts()" placeholder="Փնտրել..." 
                    class="w-full pl-4 pr-4 py-2.5 rounded-2xl text-slate-900 text-sm outline-none">
            </div>
            <div class="relative bg-white/20 p-2.5 rounded-xl cursor-pointer" onclick="openCart()">
                <span class="text-xl">🛒</span>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full border border-blue-600">0</span>
            </div>
        </div>
    </header>
    <div id="refresh-spinner" style="display:none; text-align:center; padding:10px; font-weight:bold; color:#007bff;">
    Թարմացվում է...
</div>

    <main id="app" class="p-4 max-w-2xl mx-auto">
        <section id="catalog-section">
            <div class="flex justify-between items-center mb-6 text-xs font-bold text-slate-500 uppercase tracking-widest">
                <h2>Ապրանքների Ցանկ</h2>
                <span id="productCount">0 տեսակ</span>
            </div>
            <div id="product-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="history-section" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-extrabold text-lg">Պատմություն</h2>
                <button onclick="clearHistory()" class="text-red-500 text-xs font-bold hover:underline">Մաքրել բոլորը</button>
            </div>

            <div id="total-history-sum" class="bg-blue-600 text-white p-5 rounded-3xl shadow-lg mb-6 flex flex-col gap-1">
                </div>

            <div id="history-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-4 left-4 right-4 bg-white/90 backdrop-blur-xl border border-slate-200 flex justify-around p-3 shadow-2xl rounded-3xl z-50">
        <button onclick="showSection('catalog')" class="flex flex-col items-center text-blue-600 font-bold">
            <span class="text-2xl">📦</span>
            <span class="text-[10px] uppercase">Կատալոգ</span>
        </button>
        <button onclick="showSection('history')" class="flex flex-col items-center text-slate-400 font-bold">
            <span class="text-2xl">📜</span>
            <span class="text-[10px] uppercase">Պատմություն</span>
        </button>
    </nav>

    <div id="cartModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[80vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center">
                <h3 class="text-xl font-extrabold">Զամբյուղ 🛒</h3>
                <button onclick="closeCart()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-5 border-t bg-slate-50 rounded-b-3xl text-center">
                <div class="flex justify-between items-center mb-4 font-bold text-lg">
                    <span>Ընդհանուր:</span>
                    <span id="cart-total-price" class="text-blue-600">0 ֏</span>
                </div>
                <button onclick="askCustomerName()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold uppercase">Հաստատել</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[120] backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden">
            <div id="details-customer-name" class="p-5 bg-slate-50 border-b font-black"></div>
            <div id="details-content" class="p-5 max-h-[60vh] overflow-y-auto space-y-3"></div>
            <div class="p-5"><button onclick="closeDetailsModal()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Փակել</button></div>
        </div>
    </div>

    <div id="imageZoomModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[200] backdrop-blur-md" onclick="closeImageZoom()">
        <img id="zoomedImage" src="" class="max-w-[95vw] max-h-[90vh] rounded-xl object-contain border-2 border-white/20">
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm">
            <h3 class="font-bold mb-4 text-blue-600 text-lg">Ապրանքի տվյալներ</h3>
            <input id="prod-name" type="text" placeholder="Անուն" class="w-full border p-3 mb-2 rounded-xl outline-none">
            <input id="prod-cost" type="number" placeholder="Առնված գին (ինքնարժեք)" class="w-full border p-3 mb-2 rounded-xl outline-none">
            <input id="prod-price" type="number" placeholder="Վաճառվող գին" class="w-full border p-3 mb-2 rounded-xl outline-none">
            <input id="prod-img" type="text" placeholder="Նկար (images/name.jpg)" class="w-full border p-3 mb-4 rounded-xl outline-none">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 p-3 rounded-xl font-bold">Փակել</button>
                <button id="modalActionBtn" onclick="addProduct()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">Ավելացնել</button>
            </div>
        </div>
    </div>

    <div id="nameModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-[110]">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-center shadow-2xl">
            <h3 class="font-bold mb-4">Ու՞մ անունով գրանցել:</h3>
            <input id="customer-name" type="text" class="w-full border-2 p-3 mb-4 rounded-xl text-center font-bold" placeholder="Անուն">
            <div class="flex gap-2">
                <button onclick="closeNameModal()" class="flex-1 bg-gray-100 p-3 rounded-xl font-bold">Ոչ</button>
                <button onclick="finalizeOrder()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">Գրանցել</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
